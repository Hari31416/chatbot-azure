AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Chatbot API deployed on AWS Lambda, DynamoDB, S3, and SSM.

Parameters:
  Environment:
    Type: String
    Default: prod
    Description: Deployment environment (dev, staging, prod)
  LiteLlmModel:
    Type: String
    Default: openai/gpt-oss-120b
    Description: Model to use for chat generation via LiteLLM
  LiteLlmVisionModel:
    Type: String
    Default: gemini/gemini-3.1-flash-lite
    Description: Vision model to use for chat generation via LiteLLM
  LiteLlmEmbeddingModel:
    Type: String
    Default: gemini/gemini-embedding-2
    Description: Embedding model to use for RAG via LiteLLM
  S3VectorBucketName:
    Type: String
    Default: chatbot-vectors-prod
    Description: S3 Vectors bucket name for RAG embeddings
  S3VectorIndexName:
    Type: String
    Default: enterprise-kb
    Description: S3 Vectors index name for RAG embeddings
  ContextTtlSeconds:
    Type: Number
    Default: 3600
    Description: Conversation context TTL in seconds
  LiteLlmBaseUrl:
    Type: String
    Default: https://integrate.api.nvidia.com/v1
    Description: Base URL for LiteLLM API
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
    Description: Python logging level for the Lambda function

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - arm64
    Environment:

      Variables:
        DYNAMODB_TABLE_NAME: !Ref ChatbotTable
        S3_BUCKET_NAME: !Ref ChatbotStorageBucket
        LITELLM_MODEL: !Ref LiteLlmModel
        LITELLM_BASE_URL: !Ref LiteLlmBaseUrl
        LITELLM_VISION_MODEL: !Ref LiteLlmVisionModel
        LITELLM_EMBEDDING_MODEL: !Ref LiteLlmEmbeddingModel
        LITELLM_VISION_API_KEY_PARAMETER: /chatbot/litellm_vision_api_key
        LITELLM_EMBEDDING_API_KEY_PARAMETER: /chatbot/litellm_vision_api_key
        S3_VECTOR_BUCKET_NAME: !Ref S3VectorBucketName
        S3_VECTOR_INDEX_NAME: !Ref S3VectorIndexName
        EMBEDDING_DIMENSION: 768
        RAG_TOP_K: 3
        RAG_CHUNK_SIZE: 800
        RAG_CHUNK_OVERLAP: 80
        CONTEXT_TTL_SECONDS: !Ref ContextTtlSeconds
        MAX_HISTORY_MESSAGES: 10
        LITELLM_API_KEY_PARAMETER: /chatbot/litellm_api_key
        LOG_LEVEL: !Ref LogLevel
        COGNITO_USER_POOL_ID: !Ref ChatbotUserPool
        COGNITO_CLIENT_ID: !Ref ChatbotUserPoolClient

Resources:
  # -------------------------------------------------------------
  # Lambda Function
  # -------------------------------------------------------------
  ChatbotBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./backend
      Handler: run.sh
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerArm64:27
      Policies:
        # Grants Read/Write access to the DynamoDB Table
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatbotTable
        # Grants Read/Write access to the S3 Bucket
        - S3CrudPolicy:
            BucketName: !Ref ChatbotStorageBucket
        # Grants read access to SSM SecureString parameter for LLM Keys
        - SSMParameterReadPolicy:
            ParameterName: chatbot/litellm_api_key
        - SSMParameterReadPolicy:
            ParameterName: chatbot/litellm_vision_api_key
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:PutVectors
                - s3vectors:QueryVectors
                - s3vectors:GetVectors
                - s3vectors:ListIndexes
              Resource: !Sub "arn:aws:s3vectors:${AWS::Region}:${AWS::AccountId}:bucket/${S3VectorBucketName}/*"
            - Effect: Allow
              Action:
                - s3vectors:ListVectorBuckets
              Resource: "*" # Required — no resource-level support for bucket listing
            - Effect: Allow
              Action:
                - textract:DetectDocumentText
                - textract:StartDocumentTextDetection
                - textract:GetDocumentTextDetection
              Resource: "*" # Textract does not support resource-level ARNs
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

      Events:
        # Secured proxy routes (inherits DefaultAuthorizer from ChatbotHttpApi)
        GetApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: GET
            ApiId: !Ref ChatbotHttpApi
        PostApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: POST
            ApiId: !Ref ChatbotHttpApi
        PutApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: PUT
            ApiId: !Ref ChatbotHttpApi
        DeleteApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: DELETE
            ApiId: !Ref ChatbotHttpApi
        # Public health check endpoint
        HealthEvent:
          Type: HttpApi
          Properties:
            Path: /health
            Method: GET
            ApiId: !Ref ChatbotHttpApi
            Auth:
              Authorizer: NONE

  ChatbotBackendFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ChatbotBackendFunction}
      RetentionInDays: 7

  # -------------------------------------------------------------
  # API Gateway HTTP API (API v2)
  # -------------------------------------------------------------
  ChatbotHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              Audience:
                - !Ref ChatbotUserPoolClient
              Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${ChatbotUserPool}"



  # -------------------------------------------------------------
  # DynamoDB Single Table
  # -------------------------------------------------------------
  ChatbotTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub chatbot-table-${Environment}
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserConversationsIndexV2
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: sk
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - conversation_id
              - name
              - created_at
              - updated_at
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # -------------------------------------------------------------
  # Amazon S3 Bucket for Uploads
  # -------------------------------------------------------------
  ChatbotStorageBucket:
    Type: AWS::S3::Bucket
    DependsOn: IngestionQueuePolicy
    Properties:
      BucketName: !Sub chatbot-uploads-${AWS::AccountId}-${Environment}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      # Auto-expire uploaded files after 7 days to conserve free tier storage
      LifecycleConfiguration:
        Rules:
          - Id: ExpireTemporaryUploads
            Status: Enabled
            ExpirationInDays: 7
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: staging/
            Queue: !GetAtt IngestionQueue.Arn

  # -------------------------------------------------------------
  # Amazon S3 Bucket for Static Frontend Website Hosting (Public S3 Website)
  # -------------------------------------------------------------
  ChatbotFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub chatbot-frontend-${AWS::AccountId}-${Environment}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  # -------------------------------------------------------------
  # S3 Bucket Policy allowing Public Read access for website files
  # -------------------------------------------------------------
  ChatbotFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ChatbotFrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${ChatbotFrontendBucket}/*

  # -------------------------------------------------------------
  # AWS Cognito User Pool
  # -------------------------------------------------------------
  ChatbotUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub chatbot-users-${Environment}
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
          RequireUppercase: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  # -------------------------------------------------------------
  # AWS Cognito User Pool Client
  # -------------------------------------------------------------
  ChatbotUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub chatbot-client-${Environment}
      UserPoolId: !Ref ChatbotUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  # -------------------------------------------------------------
  # Amazon S3 Vectors Vector Bucket
  # -------------------------------------------------------------
  ChatbotVectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    Properties:
      VectorBucketName: !Ref S3VectorBucketName
      EncryptionConfiguration:
        SseType: "AES256"

  # -------------------------------------------------------------
  # Amazon S3 Vectors Index
  # -------------------------------------------------------------
  ChatbotVectorIndex:
    Type: AWS::S3Vectors::Index
    DependsOn: ChatbotVectorBucket
    Properties:
      IndexName: !Ref S3VectorIndexName
      VectorBucketName: !Ref S3VectorBucketName
      DataType: "float32"
      Dimension: 768
      DistanceMetric: "cosine"
      MetadataConfiguration:
        NonFilterableMetadataKeys:
          - "text"

  # -------------------------------------------------------------
  # AWS SQS Queues for RAG Ingestion
  # -------------------------------------------------------------
  IngestionDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub chatbot-ingestion-dlq-${Environment}
      MessageRetentionPeriod: 1209600 # 14 days

  IngestionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub chatbot-ingestion-queue-${Environment}
      VisibilityTimeout: 180 # Must be >= Ingestion Worker Timeout (120s)
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt IngestionDLQ.Arn
        maxReceiveCount: 3 # Retry failed messages 3 times before sending to DLQ

  IngestionQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref IngestionQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3ToSendMessage
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt IngestionQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::chatbot-uploads-${AWS::AccountId}-${Environment}"
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # -------------------------------------------------------------
  # Ingestion Worker Lambda Function
  # -------------------------------------------------------------
  ChatbotIngestionWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./backend
      Handler: app.worker.handler
      Timeout: 120
      MemorySize: 512
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt IngestionQueue.QueueName
        - S3CrudPolicy:
            BucketName: !Sub chatbot-uploads-${AWS::AccountId}-${Environment}
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatbotTable
        - SSMParameterReadPolicy:
            ParameterName: chatbot/litellm_api_key
        - SSMParameterReadPolicy:
            ParameterName: chatbot/litellm_vision_api_key
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:PutVectors
                - s3vectors:QueryVectors
                - s3vectors:GetVectors
                - s3vectors:ListIndexes
              Resource: !Sub "arn:aws:s3vectors:${AWS::Region}:${AWS::AccountId}:bucket/${S3VectorBucketName}/*"
            - Effect: Allow
              Action:
                - s3vectors:ListVectorBuckets
              Resource: "*"
            - Effect: Allow
              Action:
                - textract:DetectDocumentText
                - textract:StartDocumentTextDetection
                - textract:GetDocumentTextDetection
              Resource: "*"
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt IngestionQueue.Arn
            BatchSize: 1 # Process one file at a time

  ChatbotIngestionWorkerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ChatbotIngestionWorkerFunction}
      RetentionInDays: 7

Outputs:
  ApiUrl:
    Description: "FastAPI base deployment URL"
    Value: !Sub "https://${ChatbotHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  FunctionUrl:
    Description: "FastAPI Lambda Function URL for response streaming"
    Value: !GetAtt ChatbotBackendFunctionUrl.FunctionUrl
  FrontendUrl:
    Description: "S3 Static Website Hosting URL for the Chatbot React Frontend"
    Value: !GetAtt ChatbotFrontendBucket.WebsiteURL
  FrontendBucket:
    Description: "S3 Bucket Name for the Frontend Website"
    Value: !Ref ChatbotFrontendBucket
  UserPoolId:
    Description: "AWS Cognito User Pool ID"
    Value: !Ref ChatbotUserPool
  UserPoolClientId:
    Description: "AWS Cognito User Pool Client ID"
    Value: !Ref ChatbotUserPoolClient

